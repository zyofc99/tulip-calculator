<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鬱金香計算機</title>
 <link rel="manifest" href="/tulip-calculator/manifest.json">
  <link rel="icon" id="favicon" type="image/svg+xml">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Quicksand', 'Noto Sans TC', sans-serif;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; overflow: hidden;
      background: linear-gradient(180deg,
        #1a3a5c 0%, #2d6a8a 20%, #4a9aba 35%,
        #87ceeb 50%, #b8e4f0 60%, #d4f0e8 75%,
        #2d5a2d 75%, #1a3d1a 100%);
      position: relative;
    }
    .sun {
      position: fixed; width:90px; height:90px;
      background: radial-gradient(circle,#fff9c4 0%,#ffe066 40%,#ffaa00 70%,transparent 100%);
      border-radius:50%; top:7%; right:16%;
      box-shadow:0 0 40px #ffe066,0 0 80px #ffcc0066;
      animation:sun-glow 4s ease-in-out infinite alternate; z-index:1;
    }
    @keyframes sun-glow {
      0%  { box-shadow:0 0 30px #ffe066,0 0 60px #ffcc0044; }
      100%{ box-shadow:0 0 60px #ffe066,0 0 120px #ffcc0066; }
    }
    .cloud { position:fixed; background:rgba(255,255,255,0.85); border-radius:50px; z-index:1; animation:cloud-move linear infinite; }
    .cloud::before,.cloud::after { content:''; position:absolute; background:rgba(255,255,255,0.85); border-radius:50%; }
    .cloud-1 { width:100px;height:30px;top:12%;left:-120px;animation-duration:30s; }
    .cloud-1::before{width:50px;height:50px;top:-25px;left:15px;}
    .cloud-1::after {width:35px;height:35px;top:-15px;left:50px;}
    .cloud-2 { width:140px;height:38px;top:18%;left:-160px;animation-duration:45s;animation-delay:-15s;opacity:0.7; }
    .cloud-2::before{width:60px;height:60px;top:-30px;left:20px;}
    .cloud-2::after {width:45px;height:45px;top:-20px;left:70px;}
    .cloud-3 { width:80px;height:24px;top:8%;left:-100px;animation-duration:38s;animation-delay:-8s;opacity:0.6; }
    .cloud-3::before{width:40px;height:40px;top:-20px;left:10px;}
    .cloud-3::after {width:30px;height:30px;top:-12px;left:40px;}
    @keyframes cloud-move { 0%{left:-200px;} 100%{left:110%;} }
    .birds { position:fixed;top:20%;left:10%;z-index:2;pointer-events:none;animation:birds-fly 20s linear infinite; }
    @keyframes birds-fly { 0%{transform:translate(0,0);}100%{transform:translate(280px,-15px);opacity:0;} }
    .bird { display:inline-block;width:16px;height:6px;border-top:2px solid #1a2a3a;border-radius:50% 50% 0 0;margin:0 4px;animation:bird-wing 0.5s ease-in-out infinite alternate; }
    .bird:nth-child(2){animation-delay:0.15s;margin-top:6px;}
    .bird:nth-child(3){animation-delay:0.3s;}
    @keyframes bird-wing{0%{transform:scaleY(1);}100%{transform:scaleY(-0.4);}}
    .mountains{position:fixed;bottom:24%;left:0;width:100%;z-index:2;pointer-events:none;}
    .mountains svg{width:100%;height:160px;display:block;}
    .trees{position:fixed;bottom:0;left:0;width:100%;height:26%;z-index:3;pointer-events:none;}
    .trees svg{width:100%;height:100%;}
    .tulip-field{position:fixed;bottom:0;left:0;width:100%;height:22%;z-index:4;pointer-events:none;}
    .tulip-field svg{width:100%;height:100%;}

    /* 計算機 */
    #calculator {
      position:relative; z-index:10;
      background:rgba(255,253,231,0.90);
      backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
      border:1.5px solid rgba(255,235,100,0.7); border-radius:26px;
      padding:20px 16px 16px; width:350px;
      box-shadow:0 8px 40px rgba(180,140,0,0.18),0 2px 8px rgba(255,255,255,0.5) inset;
    }
    .calc-title { text-align:center;font-size:18px;font-weight:700;color:#e65100;letter-spacing:3px;margin-bottom:2px;text-shadow:0 1px 3px rgba(255,255,255,0.9); }
    .calc-subtitle { text-align:center;font-size:9px;color:#f9a825;letter-spacing:4px;margin-bottom:12px; }

    #display-wrapper {
      background:linear-gradient(135deg,rgba(255,249,196,0.8),rgba(255,236,153,0.6));
      border:1.5px solid rgba(249,168,37,0.4); border-radius:14px;
      padding:10px 16px; margin-bottom:12px;
      box-shadow:inset 0 2px 8px rgba(200,140,0,0.1),0 1px 3px rgba(255,255,255,0.7);
      position:relative; overflow:hidden;
    }
    #display-wrapper::before{content:'🌷';position:absolute;left:10px;top:8px;font-size:16px;opacity:0.45;}
    #display-wrapper::after {content:'🌷';position:absolute;right:10px;bottom:6px;font-size:13px;opacity:0.35;}
    .display-label{font-size:9px;color:#e65100;letter-spacing:3px;margin-bottom:2px;text-align:right;}
    #display {
      width:100%; background:transparent; border:none; outline:none;
      color:#5d3a00; font-family:'Quicksand',sans-serif;
      font-size:42px; font-weight:700; text-align:right;
      text-shadow:0 1px 3px rgba(180,120,0,0.2);
      caret-color:#f9a825; line-height:1.1;
    }
    #display::placeholder{color:#ffe082;}

    #buttons { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; }
    button {
      padding:13px 3px; font-family:'Quicksand','Noto Sans TC',sans-serif;
      font-size:13px; font-weight:700; border:none; cursor:pointer;
      border-radius:11px; transition:all 0.15s ease;
      position:relative; overflow:hidden; letter-spacing:0.3px;
    }
    button::after {
      content:''; position:absolute; top:50%; left:50%;
      width:0; height:0; background:rgba(255,255,255,0.5);
      border-radius:50%; transform:translate(-50%,-50%);
      transition:width 0.3s,height 0.3s,opacity 0.3s; opacity:0;
    }
    button:active::after{width:110px;height:110px;opacity:1;}
    button:hover{transform:translateY(-2px);filter:brightness(1.08);}
    button:active{transform:translateY(1px);}

    /* 數字鍵 - 淡黃 */
    .key-num  {background:linear-gradient(145deg,#fffde7,#fff9c4);color:#5d3a00;box-shadow:0 3px 8px rgba(249,168,37,0.2),inset 0 1px 0 rgba(255,255,255,0.9);border:1px solid rgba(255,224,130,0.6);}
    /* 運算鍵 - 天空藍 */
    .key-op   {background:linear-gradient(145deg,#e3f2fd,#bbdefb);color:#0d47a1;box-shadow:0 3px 8px rgba(33,150,243,0.15),inset 0 1px 0 rgba(255,255,255,0.8);border:1px solid rgba(100,181,246,0.4);}
    /* 功能鍵 - 金黃 */
    .key-fn   {background:linear-gradient(145deg,#fff8e1,#ffecb3);color:#e65100;box-shadow:0 3px 8px rgba(255,152,0,0.18),inset 0 1px 0 rgba(255,255,255,0.8);border:1px solid rgba(255,213,79,0.6);}
    /* 三角函數鍵 - 橘黃 */
    .key-trig {background:linear-gradient(145deg,#fff3e0,#ffe0b2);color:#bf360c;box-shadow:0 3px 8px rgba(255,111,0,0.15),inset 0 1px 0 rgba(255,255,255,0.8);border:1px solid rgba(255,183,77,0.5);}
    /* 清除鍵 */
    #clear {background:linear-gradient(145deg,#ffebee,#ffcdd2);color:#b71c1c;box-shadow:0 3px 8px rgba(244,67,54,0.2),inset 0 1px 0 rgba(255,255,255,0.8);border:1px solid rgba(239,154,154,0.5);font-size:11px;}
    /* 等號鍵 - 深金黃 */
    #equals {background:linear-gradient(145deg,#f9a825,#e65100);color:#fffde7;font-size:15px;font-weight:700;box-shadow:0 4px 14px rgba(230,81,0,0.4),inset 0 1px 0 rgba(255,255,255,0.2);border:1px solid rgba(255,183,77,0.4);text-shadow:0 1px 2px rgba(0,0,0,0.2);}
    #equals:hover{background:linear-gradient(145deg,#ffb300,#f57c00);box-shadow:0 6px 18px rgba(230,81,0,0.55);}

    .footer-deco{text-align:center;margin-top:12px;font-size:18px;letter-spacing:5px;opacity:0.6;}
    .petal{position:fixed;pointer-events:none;z-index:5;animation:petal-fall linear infinite;opacity:0.85;font-size:14px;}
    @keyframes petal-fall {
      0%  {transform:translateY(-20px) rotate(0deg) translateX(0);opacity:0;}
      10% {opacity:0.85;}
      50% {transform:translateY(50vh) rotate(180deg) translateX(30px);}
      90% {opacity:0.6;}
      100%{transform:translateY(105vh) rotate(360deg) translateX(-20px);opacity:0;}
    }
  </style>
</head>
<body>

  <div class="sun"></div>
  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>
  <div class="cloud cloud-3"></div>
  <div class="birds"><div class="bird"></div><div class="bird"></div><div class="bird"></div></div>

  <div class="mountains">
    <svg viewBox="0 0 1200 160" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <polygon points="0,160 150,40 300,160" fill="#4a7a5a" opacity="0.6"/>
      <polygon points="100,160 280,20 460,160" fill="#3d6b4a" opacity="0.8"/>
      <polygon points="300,160 500,50 700,160" fill="#5a8a6a" opacity="0.7"/>
      <polygon points="500,160 700,30 900,160" fill="#3a6040" opacity="0.9"/>
      <polygon points="700,160 900,60 1100,160" fill="#4d7a5a" opacity="0.75"/>
      <polygon points="900,160 1080,45 1200,160" fill="#3d6a4a" opacity="0.85"/>
      <polygon points="270,20 280,8 290,20" fill="rgba(255,255,255,0.7)"/>
      <polygon points="690,30 700,15 710,30" fill="rgba(255,255,255,0.7)"/>
      <polygon points="1070,45 1080,28 1090,45" fill="rgba(255,255,255,0.6)"/>
    </svg>
  </div>

  <div class="trees">
    <svg viewBox="0 0 1200 200" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="0" y="120" width="1200" height="80" fill="#2d5a2d"/>
      <g fill="#1a4a1a">
        <polygon points="30,120 55,50 80,120"/><polygon points="20,120 55,70 90,120" opacity="0.7"/>
        <polygon points="100,120 130,55 160,120"/><polygon points="200,120 225,45 250,120"/>
        <polygon points="350,120 380,60 410,120"/><polygon points="500,120 530,50 560,120"/>
        <polygon points="650,120 680,55 710,120"/><polygon points="800,120 830,48 860,120"/>
        <polygon points="950,120 980,52 1010,120"/><polygon points="1080,120 1110,58 1140,120"/>
      </g>
    </svg>
  </div>

  <!-- 黃色鬱金香田 -->
  <div class="tulip-field">
    <svg viewBox="0 0 1200 180" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="0" y="100" width="1200" height="80" fill="#3a7a3a"/>
      <g><rect x="58"   y="80" width="4" height="30" fill="#4a8a3a"/><ellipse cx="60"   cy="72" rx="10" ry="14" fill="#fdd835"/><ellipse cx="55"   cy="78" rx="7" ry="10" fill="#ffee58"/><ellipse cx="65"   cy="78" rx="7" ry="10" fill="#f9a825"/></g>
      <g><rect x="158"  y="75" width="4" height="35" fill="#4a8a3a"/><ellipse cx="160"  cy="67" rx="10" ry="14" fill="#ffb300"/><ellipse cx="155"  cy="73" rx="7" ry="10" fill="#ffd54f"/><ellipse cx="165"  cy="73" rx="7" ry="10" fill="#ff8f00"/></g>
      <g><rect x="258"  y="78" width="4" height="32" fill="#4a8a3a"/><ellipse cx="260"  cy="70" rx="10" ry="14" fill="#fdd835"/><ellipse cx="255"  cy="76" rx="7" ry="10" fill="#ffee58"/><ellipse cx="265"  cy="76" rx="7" ry="10" fill="#f9a825"/></g>
      <g><rect x="358"  y="76" width="4" height="34" fill="#4a8a3a"/><ellipse cx="360"  cy="68" rx="10" ry="14" fill="#ffe082"/><ellipse cx="355"  cy="74" rx="7" ry="10" fill="#fff176"/><ellipse cx="365"  cy="74" rx="7" ry="10" fill="#ffca28"/></g>
      <g><rect x="458"  y="79" width="4" height="31" fill="#4a8a3a"/><ellipse cx="460"  cy="71" rx="10" ry="14" fill="#ffb300"/><ellipse cx="455"  cy="77" rx="7" ry="10" fill="#ffd54f"/><ellipse cx="465"  cy="77" rx="7" ry="10" fill="#ff8f00"/></g>
      <g><rect x="558"  y="77" width="4" height="33" fill="#4a8a3a"/><ellipse cx="560"  cy="69" rx="10" ry="14" fill="#fdd835"/><ellipse cx="555"  cy="75" rx="7" ry="10" fill="#ffee58"/><ellipse cx="565"  cy="75" rx="7" ry="10" fill="#f9a825"/></g>
      <g><rect x="658"  y="80" width="4" height="30" fill="#4a8a3a"/><ellipse cx="660"  cy="72" rx="10" ry="14" fill="#ffe082"/><ellipse cx="655"  cy="78" rx="7" ry="10" fill="#fff176"/><ellipse cx="665"  cy="78" rx="7" ry="10" fill="#ffca28"/></g>
      <g><rect x="758"  y="76" width="4" height="34" fill="#4a8a3a"/><ellipse cx="760"  cy="68" rx="10" ry="14" fill="#fdd835"/><ellipse cx="755"  cy="74" rx="7" ry="10" fill="#ffee58"/><ellipse cx="765"  cy="74" rx="7" ry="10" fill="#f9a825"/></g>
      <g><rect x="858"  y="78" width="4" height="32" fill="#4a8a3a"/><ellipse cx="860"  cy="70" rx="10" ry="14" fill="#ffb300"/><ellipse cx="855"  cy="76" rx="7" ry="10" fill="#ffd54f"/><ellipse cx="865"  cy="76" rx="7" ry="10" fill="#ff8f00"/></g>
      <g><rect x="958"  y="75" width="4" height="35" fill="#4a8a3a"/><ellipse cx="960"  cy="67" rx="10" ry="14" fill="#ffe082"/><ellipse cx="955"  cy="73" rx="7" ry="10" fill="#fff176"/><ellipse cx="965"  cy="73" rx="7" ry="10" fill="#ffca28"/></g>
      <g><rect x="1098" y="77" width="4" height="33" fill="#4a8a3a"/><ellipse cx="1100" cy="69" rx="10" ry="14" fill="#fdd835"/><ellipse cx="1095" cy="75" rx="7" ry="10" fill="#ffee58"/><ellipse cx="1105" cy="75" rx="7" ry="10" fill="#f9a825"/></g>
    </svg>
  </div>

  <div id="petals-container"></div>

  <div id="calculator">
    <div class="calc-title">🌷 鬱金香計算機 🌷</div>
    <div class="calc-subtitle">✦ 數字與花香的和諧 ✦</div>
    <div id="display-wrapper">
      <div class="display-label">輸入算式</div>
      <input type="text" id="display" placeholder="0" readonly>
    </div>
    <div id="buttons">
      <button class="key-num" onclick="appendToDisplay('(')">(</button>
      <button class="key-num" onclick="appendToDisplay(')')">)</button>
      <button id="clear"  onclick="clearDisplay()">🌷 清除</button>
      <button class="key-op" onclick="backspace()">⌫ 退格</button>
      <button class="key-op" onclick="appendToDisplay('/')">÷</button>

      <button class="key-num" onclick="appendToDisplay('7')">7</button>
      <button class="key-num" onclick="appendToDisplay('8')">8</button>
      <button class="key-num" onclick="appendToDisplay('9')">9</button>
      <button class="key-op" onclick="appendToDisplay('*')">×</button>
      <button class="key-fn" onclick="power()">xʸ</button>

      <button class="key-num" onclick="appendToDisplay('4')">4</button>
      <button class="key-num" onclick="appendToDisplay('5')">5</button>
      <button class="key-num" onclick="appendToDisplay('6')">6</button>
      <button class="key-op" onclick="appendToDisplay('-')">−</button>
      <button class="key-fn" onclick="sqrt()">√x</button>

      <button class="key-num" onclick="appendToDisplay('1')">1</button>
      <button class="key-num" onclick="appendToDisplay('2')">2</button>
      <button class="key-num" onclick="appendToDisplay('3')">3</button>
      <button class="key-op" onclick="appendToDisplay('+')">+</button>
      <button class="key-fn" onclick="doLog()">log</button>

      <button class="key-num" onclick="appendToDisplay('0')">0</button>
      <button class="key-num" onclick="appendToDisplay('.')">.</button>
      <button class="key-fn" onclick="appendToDisplay(Math.E.toFixed(5))">e</button>
      <button class="key-fn" onclick="appendToDisplay(Math.PI.toFixed(5))">π</button>
      <button class="key-fn" onclick="ln()">ln</button>

      <button class="key-trig" onclick="doSin()">sin</button>
      <button class="key-trig" onclick="doCos()">cos</button>
      <button class="key-trig" onclick="doTan()">tan</button>
      <button class="key-fn"   onclick="factorial()">n!</button>
      <button id="equals" onclick="calculate()">🌷 =</button>
    </div>
    <div class="footer-deco">🌷 🌼 🌻 🌼 🌷</div>
  </div>

  <script>
    // ── 內嵌黃色鬱金香 SVG favicon ──
    const tulipSVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
      <circle cx="96" cy="96" r="96" fill="#fffde7"/>
      <circle cx="96" cy="96" r="90" fill="none" stroke="#fff176" stroke-width="4"/>
      <rect x="92" y="115" width="8" height="52" rx="4" fill="#4a8a3a"/>
      <ellipse cx="74"  cy="138" rx="18" ry="8" fill="#5aaa4a" transform="rotate(-35 74 138)"/>
      <ellipse cx="118" cy="138" rx="18" ry="8" fill="#5aaa4a" transform="rotate(35 118 138)"/>
      <ellipse cx="68"  cy="90"  rx="16" ry="30" fill="#ffee58" transform="rotate(-22 68 90)"/>
      <ellipse cx="124" cy="90"  rx="16" ry="30" fill="#f9a825" transform="rotate(22 124 90)"/>
      <ellipse cx="96"  cy="78"  rx="20" ry="38" fill="#fdd835"/>
      <ellipse cx="90"  cy="65"  rx="8"  ry="16" fill="rgba(255,255,255,0.35)"/>
      <circle  cx="96"  cy="58"  r="4"           fill="#fff9c4" opacity="0.8"/>
      <ellipse cx="60"  cy="170" rx="12" ry="6"  fill="#4a8a3a" opacity="0.5" transform="rotate(-20 60 170)"/>
      <ellipse cx="132" cy="170" rx="12" ry="6"  fill="#4a8a3a" opacity="0.5" transform="rotate(20 132 170)"/>
    </svg>`;
    const svgBlob = new Blob([tulipSVG], {type:'image/svg+xml'});
    document.getElementById('favicon').href = URL.createObjectURL(svgBlob);

    // ── 落花效果（黃色系） ──
    const petalsEmoji = ['🌷','🌼','🌻','✨','🌾'];
    const petalContainer = document.getElementById('petals-container');
    function createPetal() {
      const p = document.createElement('div');
      p.classList.add('petal');
      p.textContent = petalsEmoji[Math.floor(Math.random()*petalsEmoji.length)];
      p.style.left = Math.random()*100 + 'vw';
      p.style.animationDuration = (7 + Math.random()*8) + 's';
      p.style.animationDelay    = (Math.random()*4) + 's';
      p.style.fontSize = (11 + Math.random()*10) + 'px';
      petalContainer.appendChild(p);
      setTimeout(() => p.remove(), 18000);
    }
    for (let i = 0; i < 10; i++) setTimeout(createPetal, i*1000);
    setInterval(createPetal, 1800);

    // ── 計算機邏輯 ──
    const display = document.getElementById('display');
    function appendToDisplay(v) { if(display.value==='錯誤') display.value=''; display.value+=v; }
    function clearDisplay()     { display.value=''; }
    function backspace()        { display.value=display.value.slice(0,-1); }
    function calculate() {
      try { let e=display.value.replace(/×/g,'*').replace(/÷/g,'/').replace(/−/g,'-'); display.value=parseFloat(eval(e).toPrecision(10)); }
      catch { display.value='錯誤'; }
    }
    function sqrt()      { try{display.value=parseFloat(Math.sqrt(eval(display.value)).toPrecision(10));}catch{display.value='錯誤';} }
    function power()     { appendToDisplay('**'); }
    function doLog()     { try{display.value=parseFloat(Math.log10(eval(display.value)).toPrecision(10));}catch{display.value='錯誤';} }
    function ln()        { try{display.value=parseFloat(Math.log(eval(display.value)).toPrecision(10));}catch{display.value='錯誤';} }
    function doSin()     { try{display.value=parseFloat(Math.sin(eval(display.value)).toPrecision(10));}catch{display.value='錯誤';} }
    function doCos()     { try{display.value=parseFloat(Math.cos(eval(display.value)).toPrecision(10));}catch{display.value='錯誤';} }
    function doTan()     { try{display.value=parseFloat(Math.tan(eval(display.value)).toPrecision(10));}catch{display.value='錯誤';} }
    function factorial() {
      try { const n=parseInt(eval(display.value)); if(n<0||n>170) throw new Error(); let r=1; for(let i=2;i<=n;i++) r*=i; display.value=r; }
      catch { display.value='錯誤'; }
    }
  </script>
</body>
</html>
